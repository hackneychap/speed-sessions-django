    <path d="M 160 40 C 160 10, 100 0, 80 0 C 40 0, 20 20, 20 50 C 20 80, 50 90, 80 100 C 120 110, 140 130, 140 170 C 140 210, 110 240, 70 240 C 30 240, 0 210, 0 180 L 40 170 C 40 190, 50 205, 70 205 C 100 205, 100 180, 100 170 C 100 140, 70 130, 40 120 C 10 110, -10 80, -10 50 C -10 10, 30 -35, 80 -35 C 120 -35, 150 -15, 160 10 Z" />
