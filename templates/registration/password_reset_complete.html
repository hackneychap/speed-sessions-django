{% extends 'workouts/base.html' %}

{% block content %}
<div class="flex items-center justify-center py-20 px-4">
    <div class="w-full max-w-md bg-white border border-black border-2 p-8 rounded-none shadow-none relative text-center">
        <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-black px-4 py-1 rounded-none text-white font-black italic uppercase tracking-widest shadow-none">
            Success
        </div>

        <h2 class="text-3xl font-black text-black mb-4 italic uppercase tracking-tighter">Password Reset Complete</h2>

        <p class="text-black mb-8 font-mono">
            Your password has been set. You may go ahead and log in now.
        </p>

        <a href="{% url 'login' %}" class="inline-block w-full py-3 bg-black hover:bg-white text-white hover:text-black font-black text-xl rounded-none shadow-none transition-all uppercase italic border-2 border-black">
            Login Now
        </a>
    </div>
</div>
{% endblock %}
