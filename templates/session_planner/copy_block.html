{% extends 'workouts/base.html' %}

{% block content %}
<div class="container mx-auto py-10 px-4" style="max-width: 600px;">
    <h1 class="text-3xl font-black italic uppercase tracking-tighter text-black mb-6">Copy Training Block</h1>

    <div class="bg-gray-100 border border-black border-2 p-4 mb-6 rounded-none">
        <p class="text-sm font-bold text-black uppercase tracking-widest mb-1">Original Block</p>
        <h2 class="text-xl font-bold text-black uppercase">{{ original_block.title }}</h2>
        <span class="text-black text-xs font-mono bg-white px-2 py-1 rounded-none inline-block mt-1 uppercase border border-black">{{ original_block.target_distance }}</span>
    </div>

    <form method="POST" class="bg-white border border-black border-2 p-6 rounded-none shadow-none">
        {% csrf_token %}
        <div class="mb-6">
            <label class="block text-xs font-bold text-black uppercase tracking-widest mb-2">New Title for Your Community</label>
            <input type="text" name="title" value="{{ original_block.title }} (Copy)" required class="w-full bg-white border border-black border-2 text-black rounded-none px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black">
        </div>

        <div class="flex gap-4">
            <button type="submit" class="flex-1 py-2 bg-black hover:bg-white text-white font-bold rounded-none uppercase tracking-wider border-2 border-black">Copy Block</button>
            <a href="javascript:history.back()" class="px-4 py-2 bg-white hover:bg-gray-100 text-black border-2 border-black rounded-none font-bold uppercase tracking-wider">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
