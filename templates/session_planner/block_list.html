{% extends 'workouts/base.html' %}

{% block content %}
<div class="container mx-auto py-10 px-4" style="max-width: 1000px;">
    <div class="d-flex justify-content-between align-items-center mb-8">
        <h1 class="text-4xl font-black italic uppercase tracking-tighter text-black">
            Training <span class="text-black">Blocks</span>
        </h1>
        <a href="{% url 'create-block' %}" class="btn bg-black hover:bg-white text-white border-2 border-black rounded-none font-bold uppercase tracking-wider">
            Create New Block
        </a>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
        {% for block in blocks %}
            <div class="bg-white border border-black border-2 p-6 rounded-none shadow-none hover:border-black transition-all">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-2xl font-bold text-black uppercase">{{ block.title }}</h2>
                    <span class="bg-black/20 text-black text-xs font-bold px-2 py-1 rounded-none uppercase tracking-wider">
                        {{ block.target_distance }}
                    </span>
                </div>
                <p class="text-black mb-6 text-sm leading-relaxed">
                    {{ block.description }}
                </p>
                
                <a href="{% url 'edit-block' block.id %}" class="w-full mb-3 py-3 bg-black/10 hover:bg-black/30 text-black font-bold rounded-none uppercase tracking-wider transition-colors border border-black border-2 text-center block">
                    Edit Block
                </a>

                <div id="schedule-container-{{ block.id }}">
                    <button 
                        hx-get="{% url 'get-schedule-form' block.id %}"
                        hx-target="#schedule-container-{{ block.id }}"
                        hx-swap="innerHTML"
                        class="w-full py-3 bg-white hover:bg-white text-black font-bold rounded-none uppercase tracking-wider transition-colors border border-black border-2">
                        Schedule Block
                    </button>
                </div>
            </div>
        {% empty %}
            <div class="col-span-2 text-center py-20 bg-white rounded-none border-2 border-dashed border-black">
                <p class="text-black font-bold uppercase tracking-widest">No training blocks found.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
