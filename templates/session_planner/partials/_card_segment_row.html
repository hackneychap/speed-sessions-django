<!--
    CSS Fix: This ensures high contrast for the shipping label aesthetic.
-->
<style>
    .segment-input-row .form-control:focus,
    .segment-input-row .form-select:focus {
        background-color: #ffffff !important;
        color: #000000 !important;
        border-color: #000000 !important;
        box-shadow: 4px 4px 0px 0px #000000 !important;
    }
</style>

<div class="segment-input-row bg-white p-2 rounded-none border border-black border-2 mb-2">
    <!-- ITEM TYPE MARKER -->
    <input type="hidden" name="{{ prefix }}item_type" value="segment">

    <div class="flex flex-wrap md:flex-nowrap items-center gap-2 justify-between">
        <!-- LEFT SIDE: Inputs for Reps, Distance, and Intensity -->
        <div class="flex flex-wrap items-center gap-1 flex-grow">
            <!-- Reps x Distance -->
            <div class="flex items-center gap-1">
                <input type="number" name="{{ prefix }}reps" value="{{ segment.reps }}"
                       class="bg-white text-black border-black border-2 text-center recalc-trigger w-12 text-sm p-1 focus:outline-none">
                <span class="text-black font-black text-xs">×</span>
                <select name="{{ prefix }}distance" class="bg-white text-black border-black border-2 recalc-trigger w-auto min-w-[70px] text-xs p-1 focus:outline-none">
                    <option value="200" {% if segment.distance|floatformat:0 == "200" %}selected{% endif %}>200m</option>
                    <option value="400" {% if segment.distance|floatformat:0 == "400" or not segment.distance %}selected{% endif %}>400m</option>
                    <option value="600" {% if segment.distance|floatformat:0 == "600" %}selected{% endif %}>600m</option>
                    <option value="800" {% if segment.distance|floatformat:0 == "800" %}selected{% endif %}>800m</option>
                    <option value="1000" {% if segment.distance|floatformat:0 == "1000" %}selected{% endif %}>1000m</option>
                    <option value="1200" {% if segment.distance|floatformat:0 == "1200" %}selected{% endif %}>1200m</option>
                    <option value="1600" {% if segment.distance|floatformat:0 == "1600" %}selected{% endif %}>1600m</option>
                </select>
            </div>

            <!-- Intensity and Rest -->
            <div class="flex items-center gap-1">
                <select name="{{ prefix }}intensity" class="bg-white text-black border-black border-2 recalc-trigger w-auto min-w-[85px] text-[10px] p-1 focus:outline-none uppercase font-black">
                    <option {% if segment.intensity == 'Threshold' or not segment.intensity %}selected{% endif %}>Threshold</option>
                    <option {% if segment.intensity == 'Interval' %}selected{% endif %}>Interval</option>
                    <option {% if segment.intensity == 'Repetition' %}selected{% endif %}>Repetition</option>
                </select>
                <div class="flex items-stretch border-2 border-black">
                    <input type="number" name="{{ prefix }}rest" value="{{ segment.rest }}"
                           class="w-10 bg-white text-black text-center focus:outline-none recalc-trigger text-xs py-1">
                    <span class="bg-white text-black border-l-2 border-black px-1 flex items-center justify-center text-[10px] font-black">S</span>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: Displaying calculated times -->
        <div class="text-right border-t-2 md:border-t-0 md:border-l-2 border-black pt-1 md:pt-0 md:pl-2 min-w-[75px]">
            <div class="text-black font-mono font-black text-sm">
                {{ segment.target_pace }}
            </div>
            <div class="text-black text-[9px] font-mono uppercase tracking-widest leading-tight">
                {{ segment.lap_time }}
            </div>
        </div>
    </div>
</div>
