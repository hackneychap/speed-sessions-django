<div class="segment-row flex flex-col md:flex-row md:items-center gap-4 bg-white p-4 border-2 border-black mb-2">
    <!-- MARKER FOR THE PARSER -->
    <input type="hidden" name="item_type" value="segment">

    <div class="flex-1 min-w-[80px]">
        <label class="block text-black font-black uppercase text-[10px] tracking-widest mb-1 md:hidden">Reps</label>
        <input type="number" name="reps" class="w-full p-2 bg-white border-2 border-black text-black font-mono focus:outline-none focus:ring-0 focus:shadow-[4px_4px_0px_0px_#000]" placeholder="Reps" value="{{ segment.reps|default:1 }}" required>
    </div>

    <div class="flex-1 min-w-[120px]">
        <label class="block text-black font-black uppercase text-[10px] tracking-widest mb-1 md:hidden">Distance</label>
        <select name="distance" class="w-full p-2 bg-white border-2 border-black text-black font-mono focus:outline-none focus:ring-0 focus:shadow-[4px_4px_0px_0px_#000] text-sm">
            <option value="200" {% if segment.distance|stringformat:"s" == "200" %}selected{% endif %}>200m</option>
            <option value="400" {% if segment.distance|stringformat:"s" == "400" or not segment.distance %}selected{% endif %}>400m</option>
            <option value="600" {% if segment.distance|stringformat:"s" == "600" %}selected{% endif %}>600m</option>
            <option value="800" {% if segment.distance|stringformat:"s" == "800" %}selected{% endif %}>800m</option>
            <option value="1000" {% if segment.distance|stringformat:"s" == "1000" %}selected{% endif %}>1000m</option>
            <option value="1200" {% if segment.distance|stringformat:"s" == "1200" %}selected{% endif %}>1200m</option>
            <option value="1600" {% if segment.distance|stringformat:"s" == "1600" %}selected{% endif %}>1600m</option>
        </select>
    </div>

    <div class="flex-1 min-w-[140px]">
        <label class="block text-black font-black uppercase text-[10px] tracking-widest mb-1 md:hidden">Intensity</label>
        <select name="intensity" class="w-full p-2 bg-white border-2 border-black text-black font-mono focus:outline-none focus:ring-0 focus:shadow-[4px_4px_0px_0px_#000] text-sm">
            <option {% if segment.intensity == 'Threshold' or not segment.intensity %}selected{% endif %}>Threshold</option>
            <option {% if segment.intensity == 'Interval' %}selected{% endif %}>Interval</option>
            <option {% if segment.intensity == 'Repetition' %}selected{% endif %}>Repetition</option>
        </select>
    </div>

    <div class="flex-1 min-w-[100px]">
        <label class="block text-black font-black uppercase text-[10px] tracking-widest mb-1 md:hidden">Rest</label>
        <div class="flex items-stretch border-2 border-black">
            <input type="number" name="rest" class="w-full p-2 bg-white text-black font-mono focus:outline-none" value="{{ segment.rest|default:60 }}">
            <span class="bg-black text-white px-2 flex items-center justify-center font-black text-xs uppercase">s</span>
        </div>
    </div>

    <div class="md:flex-none">
        <button type="button" class="w-full md:w-auto px-4 py-2 border-2 border-red-600 text-red-600 hover:bg-red-600 hover:text-white font-black uppercase italic text-xs transition-all" onclick="this.closest('.segment-row').remove()">
            Remove
        </button>
    </div>
</div>
