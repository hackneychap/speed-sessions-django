<form hx-post="{% url 'apply-block-to-calendar' %}" hx-swap="outerHTML" class="bg-white p-4 rounded-none border border-black border-2">
    {% csrf_token %}
    <input type="hidden" name="block_id" value="{{ block.id }}">
    
    <div class="mb-4">
        <label for="start_date" class="block text-xs font-bold text-black uppercase tracking-widest mb-2">Start Date</label>
        <input type="date" id="start_date" name="start_date" required
               class="w-full bg-white border border-black border-2 text-black rounded-none px-3 py-2 focus:outline-none focus:border-black">
    </div>
    
    <div class="flex gap-2">
        <button type="submit" class="flex-1 py-2 bg-black hover:bg-white text-white font-bold rounded-none uppercase text-sm tracking-wider transition-colors">
            Confirm
        </button>
        <button type="button" 
                onclick="this.closest('form').outerHTML = '<button hx-get=\'{% url 'get-schedule-form' block.id %}\' hx-target=\'#schedule-container-{{ block.id }}\' hx-swap=\'innerHTML\' class=\'w-full py-3 bg-white hover:bg-white text-black font-bold rounded-none uppercase tracking-wider transition-colors border border-black border-2\'>Schedule Block</button>'"
                class="px-3 py-2 bg-white hover:bg-white text-black rounded-none uppercase text-xs font-bold">
            Cancel
        </button>
    </div>
</form>
