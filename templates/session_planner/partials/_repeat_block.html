<div class="repeat-block border-2 border-dashed border-black rounded-none p-3 bg-white mb-3 shadow-none">
    <div class="row align-items-center mb-2">
        <div class="col-auto">
            <div class="input-group input-group-sm" style="max-width: 150px;">
                <input type="number" name="block_multiplier" class="form-control bg-white text-black border-black border-2 font-bold" value="{{ block.multiplier|default:2 }}">
                <span class="input-group-text bg-white text-black border-black border-2">Sets of:</span>
            </div>
        </div>
        <div class="col text-end">
            <button type="button" class="btn btn-sm border-2 border-black text-red-600 bg-white hover:bg-white hover:text-white rounded-none border-0" onclick="this.closest('.repeat-block').remove()">Remove Block</button>
        </div>
    </div>

    <!-- START MARKER -->
    <input type="hidden" name="item_type" value="block_start">

    <div class="block-segments ps-4 border-l-2 border-black border-2 space-y-2">
        {% if block.segments %}
            {% for segment in block.segments %}
                {% include 'session_planner/partials/_workout_segment.html' with segment=segment %}
            {% endfor %}
        {% else %}
            {% include 'session_planner/partials/_workout_segment.html' %}
        {% endif %}
    </div>

    <div class="ps-4 mt-2">
        <button type="button" class="btn btn-xs btn-link text-black p-0 text-decoration-none"
                hx-get="{% url 'add-workout-segment' %}"
                hx-target="previous .block-segments"
                hx-swap="beforeend">
            + Add segment to this block
        </button>
    </div>

    <!-- END MARKER -->
    <input type="hidden" name="item_type" value="block_end">
</div>
